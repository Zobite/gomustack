name: Auto Labeler

on:
  pull_request_target:
    types: [ opened, synchronize, reopened ]

jobs:
  labeler:
    name: Auto Label PR Areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Apply Area Labels
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
